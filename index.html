<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Connect to a Walkabout Minigolf slot for an Archipelago multiworld">
    <title>Walkabout AP Client</title>

    <link rel="icon" type="image/png" sizes="16x16" href="favicon.png">
    <link rel="stylesheet" type="text/css" href="main.css">
    <link rel="stylesheet" type="text/css" href="styles/topBar.css">
    <link rel="stylesheet" type="text/css" href="styles/settings.css">
    <link rel="stylesheet" type="text/css" href="styles/courseSelect.css">
    <link rel="stylesheet" type="text/css" href="styles/scorecard.css">
    <script type="module" src="main.js"></script>
    <script type="application/javascript" src="scripts/parseCourseInfo.js"></script>
    <script type="application/javascript" src="scripts/courseSelect.js"></script>
    <script type="application/javascript" src="scripts/scorecard.js"></script>
</head>
<body>
    <div id="connection-info">
        <span id="top-text">Not currently connected</span>
        <button id="top-disconnect">Disconnect</button>
    </div>
    <div id="connect-controls" class="active">
        <div>
            <label for="input-address">Address and Port: </label>
            <input type="text" id="input-address" placeholder="archipelago.gg:38281" value="archipelago.gg:38281"></input>
        </div>
        <div>
            <label for="input-username">Username: </label>
            <input type="text" id="input-username"></input>
        </div>
        <div>
            <label for="input-password">Password: </label>
            <input type="password" id="input-password"></input>
        </div>
        <div>
            <button id="controls-connect">Connect</button>
            <button id="controls-disconnect" disabled>Disconnect</button>
        </div>
        <input id="chat-input"></input>
    </div>
    <div id="course-select" class="main content">Select a course
        <div id="course-select-list"></div>
    </div>
    <div id="scorecard" class="main">
        <div id="scorecard-top">
            <span id="scorecard-top-title"></span>
            <button id="select-course">O</button>
        </div>
        <div id="scorecard-tabs">
            <div id="tab-button-0" class="active">Normal</div>
            <div id="tab-button-1">Hard</div>
        </div>
        <div id="scorecard-content" class="content">
            <div id="scorecard-0" class="scorecard-content active">
                <div class="scorecard-grid"></div>
                <div class="scorecard-targets"></div>
            </div>
            <div id="scorecard-1" class="scorecard-content">
                <div class="scorecard-grid"></div>
                <div class="scorecard-targets"></div>
                <div class="scorecard-foxhunts"></div>
            </div>
        </div>
    </div>
</body>
