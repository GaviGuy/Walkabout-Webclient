<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Connect to a Walkabout Minigolf slot for an Archipelago multiworld">
    <title>Walkabout AP Client</title>

    <link rel="icon" type="image/png" sizes="16x16" href="favicon.png">
    <link rel="stylesheet" type="text/css" href="main.css">
    <link rel="stylesheet" type="text/css" href="styles/topBar.css">
    <link rel="stylesheet" type="text/css" href="styles/settings.css">
    <link rel="stylesheet" type="text/css" href="styles/courseSelect.css">
    <script type="module" src="main.js"></script>
    <script type="application/javascript" src="scripts/parseCourseInfo.js"></script>
</head>
<body>
    <div id="connection-info">
        <span id="top-text">Not currently connected</span>
        <button id="top-disconnect">Disconnect</button>
    </div>
    <div id="connect-controls">
        <div>
            <label for="input-address">Address and Port: </label>
            <input type="text" id="input-address" value="archipelago.gg:38281"></input>
        </div>
        <div>
            <label for="input-username">Username: </label>
            <input type="text" id="input-username"></input>
        </div>
        <div>
            <label for="input-password">Password: </label>
            <input type="text" id="input-password"></input>
        </div>
        <div>
            <button id="controls-connect">Connect</button>
            <button id="controls-disconnect" disabled>Disconnect</button>
        </div>
        <input id="chat-input"></input>
    </div>
    <div id="course-select" class="content active">COURSE SELECT
        <div id="course-select-list"></div>
    </div>
    <div id="scorecard" class="content">SCORECARD</div>
</body>
